<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Property Evaluator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #eef2f7;
    margin: 0;
    padding: 20px;
  }

  /* Container for outputs + break-even */
  .output-container {
    display: flex;
    gap: 20px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    flex-wrap: wrap; /* Makes it responsive */
  }

  /* Investment performance section */
  .investment-performance {
    flex: 2; /* Larger width */
    min-width: 250px;
  }

  .investment-performance h2 {
    margin-top: 0;
    color: #1a3d7c; /* dark blue header */
  }

  .output-item {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
  }

  /* Break-even calculator section */
  .break-even-calculator {
    flex: 1; /* Smaller width */
    min-width: 200px;
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
  }

  .break-even-calculator h2 {
    margin-top: 0;
    color: #1a3d7c;
  }

  .break-even-calculator label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
  }

  .break-even-calculator input {
    width: 100%;
    padding: 6px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  .break-even-calculator button {
    width: 100%;
    padding: 8px;
    background-color: #1a3d7c;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }

  .break-even-calculator button:hover {
    background-color: #14406b;
  }

  .break-even-result {
    margin-top: 10px;
    padding: 10px;
    background: #e2e8f0;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
  }

  @media (max-width: 768px) {
    .output-container {
      flex-direction: column;
    }
  }
</style>
</head>
<body>

<div class="output-container">

  <!-- Investment Performance -->
  <div class="investment-performance">
    <h2>Investment Performance</h2>
    <div class="output-item">Annual Cash Flow: $12,000</div>
    <div class="output-item">ROI: 8%</div>
    <div class="output-item">Net Income: $9,500</div>
    <!-- Add your other outputs here -->
  </div>

  <!-- Break-even Calculator -->
  <div class="break-even-calculator">
    <h2>Break-Even Calculator</h2>
    <label for="rent">Monthly Rent ($)</label>
    <input type="number" id="rent" placeholder="Enter monthly rent">

    <label for="expenses">Monthly Expenses ($)</label>
    <input type="number" id="expenses" placeholder="Enter monthly expenses">

    <button onclick="calculateBreakEven()">Calculate</button>

    <div class="break-even-result" id="breakEvenResult">Break-Even: $0</div>
  </div>

</div>

<script>
function calculateBreakEven() {
  const rent = parseFloat(document.getElementById('rent').value) || 0;
  const expenses = parseFloat(document.getElementById('expenses').value) || 0;
  const breakEven = rent - expenses;
  document.getElementById('breakEvenResult').textContent = 'Break-Even: $' + breakEven.toFixed(2);
}
</script>

</body>
</html>
